istungen können vom Auftraggeber gekündigt werden, soweit eine Kündigungsregelung vereinbart wurde; andernfalls gelten die gesetzlichen Regelungen. Ohne aktive Vereinbarung laufender Vergütungen entstehen nach Abnahme der Webseite keine weiteren Vergütungsansprüche des Auftragnehmers aus diesen AGB; etwaige Kosten bei externen Anbietern (Domain, Hosting) bleiben davon unberührt.\"}]\n1d:[\"$\",\"p\",null,{\"children\":\"Nach Beendigung gesonderter Betreuungsvereinbarungen bleibt die Webseite grundsätzlich bestehen; Auswirkungen auf Hosting, Domain und technischen Betrieb werden im Einzelfall vertraglich geregelt.\"}]\n1e:[\"$\",\"h2\",null,{\"children\":\"§ 7 Nutzungsrechte\"}]\n1f:[\"$\",\"p\",null,{\"children\":\"Mit vollständiger Zahlung der vereinbarten Vergütung räumt der Auftragnehmer dem Auftraggeber die einfachen Nutzungsrechte an der gelieferten Webseite ein, soweit eine Übertragung möglich ist. Fremdinhalte (z. B. Stock-Materialien) unterliegen den jeweiligen Lizenzbedingungen der Anbieter.\"}]\n20:[\"$\",\"h2\",null,{\"children\":\"§ 8 Haftung\"}]\n21:[\"$\",\"p\",null,{\"children\":\"Der Auftragnehmer haftet unbeschränkt bei Vorsatz und grober Fahrlässigkeit sowie bei Verletzung von Leben, Körper oder Gesundheit. Im Übrigen haftet der Auftragnehmer nur bei Verletzung wesentlicher Vertragspflichten und begrenzt auf den typischerweise vorhersehbaren Schaden, soweit gesetzlich zulässig; die Haftung für leichte Fahrlässigkeit ist ausgeschlossen, soweit gesetzlich zulässig.\"}]\n22:[\"$\",\"h2\",null,{\"children\":\"§ 9 Referenznutzung\"}]\n23:[\"$\",\"p\",null,{\"children\":\"Der Auftragnehmer darf die erstellte Webseite in Portfolio und Referenzen nennen und verlinken, sofern der Auftraggeber dem nicht ausdrücklich widerspricht.\"}]\n24:[\"$\",\"h2\",null,{\"children\":\"§ 10 Änderungen der AGB\"}]\n25:[\"$\",\"p\",null,{\"children\":\"Der Au"])</script><script>self.__next_f.push([1,"ftragnehmer kann diese AGB mit Wirkung für die Zukunft anpassen. Der Auftr
